<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#bc002d">
<title>Japan Phrasebook</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Japan">
<style>
  :root{
    --bg:#f7f3e9; --card:#fffdf7; --ink:#1c1a17; --muted:#6b655c;
    --line:#e7e0d2; --red:#bc002d; --red-soft:#fbe9ec; --accent:#0a6b6b;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 6px 18px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#141210; --card:#1f1c19; --ink:#f2ede3; --muted:#a49c8e;
      --line:#332e28; --red:#ff5a76; --red-soft:#31191f; --accent:#5fd0d0;
      --shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.4);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-size:17px; line-height:1.4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
  }
  header{
    position:sticky; top:0; z-index:10; background:var(--bg);
    padding:14px 16px 8px; border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .sun{width:26px;height:26px;border-radius:50%;background:var(--red);flex:none}
  h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
  h1 small{display:block;font-weight:500;font-size:12px;color:var(--muted);letter-spacing:.3px;margin-top:1px}
  #search{
    width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-size:16px;outline:none;
  }
  #search:focus{border-color:var(--red)}
  .voicebar{display:flex;align-items:center;gap:8px;margin-top:8px}
  .voicebar label{font-size:12.5px;color:var(--muted);font-weight:600;flex:none}
  .voicebar select{
    flex:1;min-width:0;padding:8px 10px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-size:13.5px;outline:none;
  }
  .voicebar select:focus{border-color:var(--red)}
  .voicebar .test{
    flex:none;border:1px solid var(--line);background:var(--card);color:var(--red);
    border-radius:10px;padding:8px 11px;font-size:13px;font-weight:700;cursor:pointer;
  }
  .tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 12px 4px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:none;border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:14px;font-weight:600;white-space:nowrap;cursor:pointer;
  }
  .tab.active{background:var(--red);border-color:var(--red);color:#fff}
  main{padding:8px 12px 40px;max-width:640px;margin:0 auto}
  .sec-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:20px 6px 8px}
  .sec-title:first-child{margin-top:6px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:12px;
  }
  .card .txt{flex:1;min-width:0}
  .jp{font-size:22px;font-weight:600;line-height:1.25}
  .romaji{font-size:14px;color:var(--accent);font-weight:600;margin-top:2px}
  .en{font-size:14px;color:var(--muted);margin-top:2px}
  .note{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:4px}
  .say{
    flex:none;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:var(--red-soft);color:var(--red);display:grid;place-items:center;
    font-size:20px;transition:transform .08s;
  }
  .say:active{transform:scale(.9)}
  .say.playing{background:var(--red);color:#fff}
  /* Reading (signs) grid */
  .reading-help{font-size:13.5px;color:var(--muted);margin:4px 6px 12px}
  .toggle{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;color:var(--muted);margin:0 6px 12px;cursor:pointer;user-select:none}
  .toggle input{width:34px;height:20px;appearance:none;background:var(--line);border-radius:999px;position:relative;outline:none;cursor:pointer;flex:none}
  .toggle input:checked{background:var(--red)}
  .toggle input::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
  .toggle input:checked::after{left:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .sign{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 12px;text-align:center;box-shadow:var(--shadow);cursor:pointer;position:relative;
  }
  .sign .big{font-size:34px;font-weight:700;line-height:1.15}
  .sign .r{font-size:14px;color:var(--accent);font-weight:600;margin-top:6px}
  .sign .e{font-size:13px;color:var(--muted);margin-top:1px}
  .sign .say{position:absolute;top:8px;right:8px;width:34px;height:34px;font-size:15px}
  body.quiz .sign .r,body.quiz .sign .e{visibility:hidden}
  body.quiz .sign.revealed .r,body.quiz .sign.revealed .e{visibility:visible}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:15px}
  .tip{background:var(--red-soft);border-radius:12px;padding:11px 13px;font-size:13px;color:var(--muted);margin:2px 6px 14px;line-height:1.45}
  .tip b{color:var(--ink)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:6px 20px 30px}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="sun"></div>
    <h1>Japan Phrasebook<small>Tap 🔊 to hear it · works offline</small></h1>
  </div>
  <input id="search" type="search" placeholder="Search English, romaji, or Japanese…" autocomplete="off">
  <div class="voicebar">
    <label for="voice">🔊 Voice</label>
    <select id="voice" aria-label="Choose pronunciation voice"></select>
    <button class="test" id="voiceTest" type="button">Test</button>
  </div>
  <div class="tabs" id="tabs"></div>
</header>
<main id="main"></main>
<footer>Offline travel Japanese · for a friendly Aussie in Japan 🇦🇺→🇯🇵 · have a ripper trip</footer>

/* ---------- SPEECH (offline device TTS) ---------- */
// Voices differ per device. Prefer a clear female voice; let the user override.
const FEMALE_HINT = /kyoko|haruka|nanami|ayumi|sayaka|o-?ren|mizuki|female|women|\bf\d/i;
const MALE_HINT   = /otoya|hattori|ichiro|\bmale\b|\bm\d/i;
let jaVoices = [], jaVoice = null;

function scoreVoice(v){
  const n = v.name || "";
  let s = 0;
  if(MALE_HINT.test(n)) s -= 10;          // avoid the low male voice
  if(FEMALE_HINT.test(n)) s += 10;        // prefer clearly female
  if(/google/i.test(n)) s += 4;           // Android's ja voice (clear, female-sounding)
  if(/enhanced|premium|siri/i.test(n)) s += 3;
  return s;
}
function friendlyName(v){
  const base = (v.name||"Voice").replace(/\s*\(.*?\)\s*/g," ").replace(/\s+/g," ").trim();
  const tag = MALE_HINT.test(v.name) ? " ♂" : (FEMALE_HINT.test(v.name)||/google/i.test(v.name) ? " ♀" : "");
  return base + tag;
}
function loadVoices(){
  jaVoices = speechSynthesis.getVoices().filter(v => (v.lang||"").toLowerCase().startsWith("ja"));
  const saved = localStorage.getItem("jpVoiceName");
  jaVoice = jaVoices.find(v=>v.name===saved)
         || jaVoices.slice().sort((a,b)=>scoreVoice(b)-scoreVoice(a))[0]
         || null;
  drawVoiceOptions();
}
function drawVoiceOptions(){
  const sel = document.getElementById("voice");
  if(!sel) return;
  if(!jaVoices.length){ sel.innerHTML='<option>Using device default</option>'; sel.disabled=true; return; }
  sel.disabled=false; sel.innerHTML="";
  jaVoices.slice().sort((a,b)=>scoreVoice(b)-scoreVoice(a)).forEach(v=>{
    const o=document.createElement("option");
    o.value=v.name; o.textContent=friendlyName(v);
    if(jaVoice && v.name===jaVoice.name) o.selected=true;
    sel.appendChild(o);
  });
}
if("speechSynthesis" in window){
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function say(text, btn){
  if(!("speechSynthesis" in window)){ alert("Your browser can’t do voice. On your iPhone/Android the installed app can."); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/…/g,"").replace(/\s*\/\s*/g,"、"));
  u.lang="ja-JP"; if(jaVoice) u.voice=jaVoice; u.rate=0.85; u.pitch=1.0;
  if(btn){ document.querySelectorAll(".say.playing").forEach(b=>b.classList.remove("playing"));
    btn.classList.add("playing"); u.onend=u.onerror=()=>btn.classList.remove("playing"); }
  speechSynthesis.speak(u);
}

/* ---------- RENDER ---------- */
const TABS = [{id:"all",name:"All"}, ...CATS.map(c=>({id:c.id,name:c.name})), {id:"reading",name:"読む Reading"}];
let activeTab="essentials", query="";
const tabsEl=document.getElementById("tabs"), mainEl=document.getElementById("main"), searchEl=document.getElementById("search");

function drawTabs(){
  tabsEl.innerHTML="";
  TABS.forEach(t=>{
    const b=document.createElement("button");
    b.className="tab"+(t.id===activeTab?" active":""); b.textContent=t.name;
    b.onclick=()=>{activeTab=t.id; query=""; searchEl.value=""; document.body.classList.remove("quiz"); drawTabs(); render(); window.scrollTo(0,0);};
    tabsEl.appendChild(b);
  });
}

function speaker(text){
  const b=document.createElement("button");
  b.className="say"; b.setAttribute("aria-label","Play pronunciation"); b.textContent="🔊";
  b.onclick=(e)=>{e.stopPropagation(); say(text,b);};
  return b;
}

function phraseCard(it){
  const card=document.createElement("div"); card.className="card";
  const txt=document.createElement("div"); txt.className="txt";
  txt.innerHTML=`<div class="jp">${it.jp}</div><div class="romaji">${it.romaji}</div><div class="en">${it.en}</div>`+
    (it.note?`<div class="note">💡 ${it.note}</div>`:"");
  card.appendChild(txt); card.appendChild(speaker(it.jp));
  return card;
}

function matches(it){
  if(!query) return true;
  const q=query.toLowerCase();
  return it.jp.toLowerCase().includes(q)||it.romaji.toLowerCase().includes(q)||it.en.toLowerCase().includes(q);
}

function render(){
  mainEl.innerHTML="";
  if(activeTab==="reading"){ renderReading(); return; }
  let cats = activeTab==="all" ? CATS : CATS.filter(c=>c.id===activeTab);
  let any=false;
  cats.forEach(c=>{
    const items=c.items.filter(matches);
    if(!items.length) return;
    any=true;
    const h=document.createElement("div"); h.className="sec-title"; h.textContent=c.name; mainEl.appendChild(h);
    if(c.tip && !query){ const t=document.createElement("div"); t.className="tip"; t.innerHTML=c.tip; mainEl.appendChild(t); }
    items.forEach(it=>mainEl.appendChild(phraseCard(it)));
  });
  if(!any) mainEl.innerHTML=`<div class="empty">No matches for “${query}”.<br>Try “bill”, “toilet”, or “thank”.</div>`;
}

function renderReading(){
  const help=document.createElement("div"); help.className="reading-help";
  help.innerHTML="Learn to spot the words on signs and menus. Tap a card to hear it. Flip on <b>Test me</b> to hide the answers.";
  mainEl.appendChild(help);

  const tog=document.createElement("label"); tog.className="toggle";
  tog.innerHTML=`<input type="checkbox" id="quiz"> Test me — hide meanings`;
  mainEl.appendChild(tog);
  tog.querySelector("input").onchange=e=>{
    document.body.classList.toggle("quiz", e.target.checked);
    mainEl.querySelectorAll(".sign").forEach(s=>s.classList.remove("revealed"));
  };

  const grid=document.createElement("div"); grid.className="grid";
  SIGNS.filter(matches).forEach(s=>{
    const el=document.createElement("div"); el.className="sign";
    el.innerHTML=`<div class="big">${s.jp}</div><div class="r">${s.romaji}</div><div class="e">${s.en}</div>`;
    el.appendChild(speaker(s.jp));
    el.onclick=()=>{ if(document.body.classList.contains("quiz")) el.classList.toggle("revealed"); say(s.jp); };
    grid.appendChild(el);
  });
  mainEl.appendChild(grid);
}

searchEl.oninput=e=>{ query=e.target.value.trim();
  if(query && activeTab!=="reading" && activeTab!=="all"){ activeTab="all"; drawTabs(); }
  render();
};

drawTabs(); render();

/* voice picker wiring */
const voiceSel=document.getElementById("voice"), voiceTest=document.getElementById("voiceTest");
voiceSel.onchange=e=>{
  jaVoice = jaVoices.find(v=>v.name===e.target.value) || null;
  if(jaVoice) localStorage.setItem("jpVoiceName", jaVoice.name);
  say("こんにちは、はじめまして");
};
voiceTest.onclick=()=>say("こんにちは、はじめまして", null);
